<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="hashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background rounded squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="url(#hashGrad)" stroke-width="8" stroke-opacity="0.4"/>

  <!-- High-tech Hash (#) Symbol -->
  <g filter="url(#glow)">
    <!-- Vertical Bars -->
    <rect x="180" y="110" width="44" height="292" rx="16" fill="url(#hashGrad)" transform="rotate(-10 202 256)"/>
    <rect x="288" y="110" width="44" height="292" rx="16" fill="url(#hashGrad)" transform="rotate(-10 310 256)"/>

    <!-- Horizontal Bars -->
    <rect x="110" y="180" width="292" height="44" rx="16" fill="url(#hashGrad)" transform="rotate(-10 256 202)"/>
    <rect x="110" y="288" width="292" height="44" rx="16" fill="url(#hashGrad)" transform="rotate(-10 256 310)"/>
  </g>

  <!-- AI Pulse Glow Node -->
  <circle cx="390" cy="120" r="28" fill="url(#accentGrad)" />
  <circle cx="390" cy="120" r="44" fill="none" stroke="#38bdf8" stroke-width="6" stroke-opacity="0.5" />
</svg>